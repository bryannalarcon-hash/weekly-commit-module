openapi: 3.0.1
info:
  title: Weekly Commit Module API
  description: "Weekly commit lifecycle (draft -> lock -> reconcile -> carry-forward),\
    \ RCDO browsing, manager review and team roll-up. Acting identity is resolved\
    \ server-side (CurrentMemberProvider), never from the request body."
  license:
    name: Proprietary
  version: 0.0.1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/settings/notifications:
    get:
      tags:
      - settings-controller
      summary: The acting member's email-notification toggles (lazy-created defaults)
      operationId: notifications
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/NotificationPreferenceDto"
    put:
      tags:
      - settings-controller
      summary: Update the acting member's email-notification toggles
      operationId: updateNotifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationPreferenceDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/NotificationPreferenceDto"
  /api/settings/account:
    get:
      tags:
      - settings-controller
      summary: The acting member's account profile + timezone
      operationId: account
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MemberAccountDto"
    put:
      tags:
      - settings-controller
      summary: Update the acting member's displayName + (validated) timezone
      operationId: updateAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberAccountDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MemberAccountDto"
  /api/integration/outlook/settings:
    put:
      tags:
      - outlook-controller
      summary: Update the create-event-on-lock sync preference
      operationId: updateSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutlookSettingsRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OutlookConnectionDto"
  /api/commits/{id}:
    get:
      tags:
      - commit-controller
      summary: "Read a weekly commit (ownership-checked: 403 if not the acting member's)"
      operationId: get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommitDto"
    put:
      tags:
      - commit-controller
      summary: Replace a DRAFT commit's items (409 if the commit is LOCKED or later)
      operationId: update
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommitRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommitDto"
  /api/commits/{id}/pulse:
    get:
      tags:
      - pulse-controller
      summary: Read the acting member's weekly Pulse for this commit (empty when unrated)
      operationId: get_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PulseDto"
    put:
      tags:
      - pulse-controller
      summary: Upsert the acting member's weekly Pulse (rating 1..5)
      operationId: put
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PulseRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PulseDto"
  /api/admin/rcdo/supporting-outcomes/{id}:
    put:
      tags:
      - rcdo-admin-controller
      summary: Update a SupportingOutcome's title/description/window/owner (admin)
      operationId: updateSupportingOutcome
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportingOutcomeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SupportingOutcomeResponse"
    delete:
      tags:
      - rcdo-admin-controller
      summary: Delete a SupportingOutcome; 409 if a commit item links it (admin)
      operationId: deleteSupportingOutcome
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/admin/rcdo/rally-cries/{id}:
    put:
      tags:
      - rcdo-admin-controller
      summary: Update a RallyCry's title/description/window/owner (admin)
      operationId: updateRallyCry
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RallyCryRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RallyCryResponse"
    delete:
      tags:
      - rcdo-admin-controller
      summary: Delete a RallyCry and its entire subtree (admin)
      operationId: deleteRallyCry
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/admin/rcdo/outcomes/{id}:
    put:
      tags:
      - rcdo-admin-controller
      summary: Update an Outcome's title/description/window/owner (admin)
      operationId: updateOutcome
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutcomeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OutcomeResponse"
    delete:
      tags:
      - rcdo-admin-controller
      summary: Delete an Outcome and its subtree (admin)
      operationId: deleteOutcome
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/admin/rcdo/defining-objectives/{id}:
    put:
      tags:
      - rcdo-admin-controller
      summary: Update a DefiningObjective's title/description/window/owner (admin)
      operationId: updateObjective
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DefiningObjectiveRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DefiningObjectiveResponse"
    delete:
      tags:
      - rcdo-admin-controller
      summary: Delete a DefiningObjective and its subtree (admin)
      operationId: deleteObjective
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/integration/outlook/connect:
    post:
      tags:
      - outlook-controller
      summary: "Begin Outlook consent: the Entra authorize URL to redirect to"
      operationId: connect
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OutlookConnectResponse"
  /api/e2e/reset:
    post:
      tags:
      - e-2e-reset-controller
      operationId: reset
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: object
  /api/e2e/commits/{id}/inject-item:
    post:
      tags:
      - e-2e-reset-controller
      operationId: injectItem
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: object
  /api/commits:
    get:
      tags:
      - commit-controller
      summary: List the acting member's own weekly commits as compact week headers
      operationId: listMine
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeekSummary"
    post:
      tags:
      - commit-controller
      summary: Create a DRAFT weekly commit owned by the acting member (from the JWT)
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommitRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommitDto"
  /api/commits/{id}/submit:
    post:
      tags:
      - commit-controller
      summary: Submit (DRAFT -> LOCKED); 422 if any item is unlinked
      operationId: submit
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommitDto"
  /api/commits/{id}/review:
    post:
      tags:
      - review-controller
      summary: Upsert the commit's manager review (403 unless the owner's manager)
      operationId: review
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReviewDto"
  /api/commits/{id}/reconciled:
    post:
      tags:
      - reconciliation-controller
      summary: Mark reviewed (RECONCILING -> RECONCILED); forces ManagerReview REVIEWED
      operationId: reconciled
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommitDto"
  /api/commits/{id}/reconcile:
    post:
      tags:
      - reconciliation-controller
      summary: Start reconciliation (LOCKED -> RECONCILING)
      operationId: reconcile
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommitDto"
  /api/commits/{id}/carry-forward:
    post:
      tags:
      - reconciliation-controller
      summary: Carry INCOMPLETE items into a fresh next-week DRAFT
      operationId: carryForward
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommitDto"
  /api/admin/rcdo/supporting-outcomes:
    post:
      tags:
      - rcdo-admin-controller
      summary: Create a SupportingOutcome under an Outcome (admin)
      operationId: createSupportingOutcome
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportingOutcomeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SupportingOutcomeResponse"
  /api/admin/rcdo/rally-cries:
    post:
      tags:
      - rcdo-admin-controller
      summary: Create a RallyCry (admin)
      operationId: createRallyCry
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RallyCryRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RallyCryResponse"
  /api/admin/rcdo/outcomes:
    post:
      tags:
      - rcdo-admin-controller
      summary: Create an Outcome under a DefiningObjective (admin)
      operationId: createOutcome
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutcomeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OutcomeResponse"
  /api/admin/rcdo/defining-objectives:
    post:
      tags:
      - rcdo-admin-controller
      summary: Create a DefiningObjective under a RallyCry (admin)
      operationId: createObjective
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DefiningObjectiveRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DefiningObjectiveResponse"
  /api/commits/{id}/items/{itemId}/status:
    patch:
      tags:
      - reconciliation-controller
      summary: Patch an item's ACTUAL status (allowed only while RECONCILING; else
        409)
      operationId: patchStatus
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: itemId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemStatusPatch"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommitDto"
  /api/rollup:
    get:
      tags:
      - rollup-controller
      summary: "Team roll-up for the acting manager (page >= 0, 1 <= size <= 2000)"
      operationId: rollup
      parameters:
      - name: page
        in: query
        required: false
        schema:
          minimum: 0
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          maximum: 2000
          minimum: 1
          type: integer
          format: int32
          default: 50
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageResponseRollupRow"
  /api/rollup/reports/{memberId}/latest-commit:
    get:
      tags:
      - rollup-controller
      summary: Resolve a report's latest reviewable commit id (dashboard drill-through
        → review)
      operationId: latestReviewableCommit
      parameters:
      - name: memberId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/review-queue:
    get:
      tags:
      - review-queue-controller
      summary: "The acting manager's review queue for a week (Pageable, capped at\
        \ 2000)"
      operationId: queue
      parameters:
      - name: weekStart
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageResponseReviewQueueRow"
  /api/rcdo/tree:
    get:
      tags:
      - rcdo-controller
      summary: The nested 4-level RCDO tree (requires an authenticated caller)
      operationId: tree
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RallyCryNode"
  /api/rcdo/supporting-outcomes:
    get:
      tags:
      - rcdo-controller
      summary: Supporting outcomes filtered by a case-insensitive title query
      operationId: supportingOutcomes
      parameters:
      - name: q
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportingOutcomeDto"
  /api/integration/outlook:
    get:
      tags:
      - outlook-controller
      summary: The acting member's Outlook connection + sync preference
      operationId: connection
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OutlookConnectionDto"
    delete:
      tags:
      - outlook-controller
      summary: Disconnect Outlook (forget the delegated token)
      operationId: disconnect
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OutlookConnectionDto"
  /api/graph/status:
    get:
      tags:
      - graph-consent-controller
      summary: Whether the acting member has connected Outlook
      operationId: status
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: object
  /api/graph/connect:
    get:
      tags:
      - graph-consent-controller
      summary: "Begin Outlook consent: redirect to the Entra authorize URL (signed\
        \ state)"
      operationId: connect_1
      responses:
        "200":
          description: OK
  /api/graph/callback:
    get:
      tags:
      - graph-consent-controller
      summary: "Outlook consent callback: verify state, exchange the code, store the\
        \ token"
      operationId: callback
      parameters:
      - name: code
        in: query
        required: true
        schema:
          type: string
      - name: state
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: object
  /api/commits/{id}/reconciliation:
    get:
      tags:
      - reconciliation-controller
      summary: Planned (snapshot) vs actual (live status) diff with per-row flags
      operationId: reconciliation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReconciliationView"
  /api/commits/current:
    get:
      tags:
      - commit-controller
      summary: "The acting member's current open week, or 204 when none exists yet"
      operationId: current
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommitDto"
  /error:
    get:
      tags:
      - problem-error-controller
      operationId: handleError
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    put:
      tags:
      - problem-error-controller
      operationId: handleError_3
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    post:
      tags:
      - problem-error-controller
      operationId: handleError_2
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    delete:
      tags:
      - problem-error-controller
      operationId: handleError_5
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    options:
      tags:
      - problem-error-controller
      operationId: handleError_6
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    head:
      tags:
      - problem-error-controller
      operationId: handleError_1
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    patch:
      tags:
      - problem-error-controller
      operationId: handleError_4
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProblemDetail"
components:
  schemas:
    UpdateNotificationPreferenceDto:
      required:
      - emailOnLock
      - emailOnReconciled
      - emailOnReview
      - reminderEmails
      - weeklyDigest
      type: object
      properties:
        emailOnLock:
          type: boolean
        emailOnReview:
          type: boolean
        emailOnReconciled:
          type: boolean
        weeklyDigest:
          type: boolean
        reminderEmails:
          type: boolean
    NotificationPreferenceDto:
      type: object
      properties:
        emailOnLock:
          type: boolean
        emailOnReview:
          type: boolean
        emailOnReconciled:
          type: boolean
        weeklyDigest:
          type: boolean
        reminderEmails:
          type: boolean
    UpdateMemberAccountDto:
      required:
      - displayName
      type: object
      properties:
        displayName:
          maxLength: 160
          minLength: 0
          type: string
        timezone:
          maxLength: 63
          minLength: 0
          type: string
    MemberAccountDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        displayName:
          type: string
        timezone:
          type: string
        canReview:
          type: boolean
    OutlookSettingsRequest:
      required:
      - createEventOnLock
      type: object
      properties:
        createEventOnLock:
          type: boolean
    OutlookConnectionDto:
      type: object
      properties:
        status:
          type: string
        account:
          type: string
        lastSyncAt:
          type: string
          format: date-time
        createEventOnLock:
          type: boolean
    CommitItemRequest:
      required:
      - text
      type: object
      properties:
        text:
          maxLength: 1000
          minLength: 0
          type: string
        supportingOutcomeId:
          type: string
          format: uuid
        chessTier:
          type: string
          enum:
          - KING
          - QUEEN
          - ROOK
          - BISHOP
          - KNIGHT
          - PAWN
    UpdateCommitRequest:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CommitItemRequest"
    CommitDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        memberId:
          type: string
          format: uuid
        weekStart:
          type: string
          format: date
        lifecycleState:
          type: string
          enum:
          - DRAFT
          - LOCKED
          - RECONCILING
          - RECONCILED
          - CARRY_FORWARD
        submittedAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
