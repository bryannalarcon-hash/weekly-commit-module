# deploy/docker-compose.ec2.yml — the on-instance stack (image-only; no build context ships to the
# EC2 host). Postgres + backend (demo,e2e,graph — real MS Graph adapter) + nginx frontend + a Caddy
# TLS edge publishing :80/:443 (HTTPS at 44-218-6-116.sslip.io for the Graph OAuth redirect; plain
# HTTP by IP still works). Consumes the pre-built wcm-backend / wcm-frontend images that
# ship-to-ec2.sh loads via `docker save | ssh docker load`. Secrets (GRAPH_TOKEN_ENC_KEY, AZURE_*)
# come from the .env placed beside this file on the instance.
services:
  postgres:
    image: postgres:16.4
    container_name: wcm-postgres
    environment:
      POSTGRES_DB: wcm
      POSTGRES_USER: wcm
      POSTGRES_PASSWORD: wcm
    volumes:
      - wcm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wcm -d wcm']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: wcm-backend:latest
    container_name: wcm-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: demo,e2e,graph
      DB_URL: jdbc:postgresql://postgres:5432/wcm
      POSTGRES_USER: wcm
      POSTGRES_PASSWORD: wcm
      GRAPH_TOKEN_ENC_KEY: ${GRAPH_TOKEN_ENC_KEY}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_REDIRECT_URI: https://44-218-6-116.sslip.io/api/graph/callback
      APP_BASE_URL: https://44-218-6-116.sslip.io
    expose:
      - '8080'
    restart: unless-stopped

  frontend:
    image: wcm-frontend:latest
    container_name: wcm-frontend
    depends_on:
      - backend
    expose:
      - '80'
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: wcm-caddy
    depends_on:
      - frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - wcm-caddy-data:/data
      - wcm-caddy-config:/config
    restart: unless-stopped

volumes:
  wcm-pgdata:
  wcm-caddy-data:
  wcm-caddy-config:
