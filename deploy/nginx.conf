# deploy/nginx.conf — the WCM frontend edge. Serves the host-shell SPA at / (history fallback to
# index.html), the federated wc-remote bundle at /remote/, and reverse-proxies /api → the backend
# container (same-origin, so the remote's RTK Query needs no CORS). One origin fronts the whole app.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API → Spring backend (compose service name "backend"). Same-origin keeps X-Debug-Member + cookies
  # simple and avoids CORS entirely.
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Federated remote: its own assets (remoteEntry.js + hashed chunks) live under /remote/.
  location /remote/ {
    alias /usr/share/nginx/html/remote/;
    try_files $uri $uri/ =404;
    add_header Access-Control-Allow-Origin "*" always;
  }

  # Host SPA: client-side routing falls back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
