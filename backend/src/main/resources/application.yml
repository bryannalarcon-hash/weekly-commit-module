# application.yml — core Spring Boot config for the Weekly Commit Module backend.
# Wires the Postgres datasource, Hibernate (validate-only, UTC, no open-in-view) and Flyway migrations.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wcm}
    username: ${POSTGRES_USER:wcm}
    password: ${POSTGRES_PASSWORD:wcm}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
