# application.yml — core Spring Boot config for the Weekly Commit Module backend.
# Wires the Postgres datasource, Hibernate (validate-only, UTC, no open-in-view), Flyway migrations,
# the Auth0 resource-server settings (U15), the delegated Microsoft Graph integration (U16) and the
# AWS SNS/SQS eventing seam (U26). Every external secret is an env ref defaulting to EMPTY so the app
# still starts with NOTHING configured (tests / bare local boot); a non-blank value activates that
# integration (Auth0 prod decoder, Graph adapter under the "graph" profile, SNS/SQS under "aws").
wcm:
  auth0:
    issuer-uri: ${AUTH0_ISSUER_URI:}
    audience: ${AUTH0_AUDIENCE:}
  graph:
    # Microsoft Entra app registration + delegated OAuth (Authorization Code + PKCE). Empty-safe.
    tenant: ${AZURE_TENANT_ID:common}
    client-id: ${AZURE_CLIENT_ID:}
    client-secret: ${AZURE_CLIENT_SECRET:}
    redirect-uri: ${AZURE_REDIRECT_URI:${APP_BASE_URL:http://localhost:8080}/api/graph/callback}
    scopes: ${AZURE_GRAPH_SCOPES:offline_access User.Read Calendars.ReadWrite}
    authorize-base: ${AZURE_AUTHORIZE_BASE:https://login.microsoftonline.com}
    graph-base: ${AZURE_GRAPH_BASE:https://graph.microsoft.com/v1.0}
    # AES-256 key (base64) encrypting Graph tokens at rest. Empty -> token store unusable (no consent).
    token-enc-key: ${GRAPH_TOKEN_ENC_KEY:}
  app:
    base-url: ${APP_BASE_URL:http://localhost:8080}
  aws:
    # SNS topic the SnsEventPublisher publishes DomainEvent JSON to (active only under "aws").
    topic-arn: ${WCM_SNS_TOPIC_ARN:}
    # SQS queue the poller long-polls and dispatches to consumers (active only under "aws").
    queue-url: ${WCM_SQS_QUEUE_URL:}
    region: ${AWS_REGION:us-east-1}
    # Optional override endpoint (LocalStack/test); empty -> real AWS endpoints.
    endpoint-override: ${WCM_AWS_ENDPOINT:}
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wcm}
    username: ${POSTGRES_USER:wcm}
    password: ${POSTGRES_PASSWORD:wcm}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    # We use no Flyway placeholders; disabling replacement keeps a literal ${...} in any migration
    # comment/DDL from being mis-parsed as an unprovided placeholder (e.g. an env-ref mention).
    placeholder-replacement: false
